<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CT Extension</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="popup-container">
        <h1>Trạng thái chứng chỉ</h1>
        <p>Trang hiện tại: <span id="current-site">Loading...</span></p>
        <div id="loading-spinner" class="spinner"></div>
        <p>Trạng thái chứng chỉ: <span id="certificate-status">Loading...</span></p>
        <button onclick="redirectToIndex()">Xem chi tiết</button>

        <hr>
        <h2>Lịch sử kiểm tra</h2>
        <div id="history-container">
            <div class="history-entry">
                <strong>example.com</strong>
                <p>Kết quả: Valid</p>
                <p>Ngày: 19/01/2025</p>
            </div>
        </div>
        <button onclick="clearHistory()">Xóa lịch sử</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
